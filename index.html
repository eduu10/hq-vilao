<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HQ Vilão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Impact', 'Arial Black', sans-serif;
    }

    /* ─── LANDING ─── */
    #landing {
      position: fixed;
      inset: 0;
      background-image: url('capateste4.png');
      background-size: cover;
      background-position: center top;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 10;
    }
    #landing::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.5) 100%);
    }

    .btn {
      position: relative;
      z-index: 1;
      width: 240px;
      padding: 16px 0;
      border: none;
      border-radius: 6px;
      font-size: 1.25rem;
      font-family: 'Impact', 'Arial Black', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 4px 4px 0 #000, 0 0 0 3px #000;
      outline: none;
    }
    .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000, 0 0 0 3px #000; }
    .btn-ler     { background: #ffe100; color: #000; }
    .btn-ler:hover { background: #ffd000; transform: translate(-1px,-2px); box-shadow: 5px 6px 0 #000, 0 0 0 3px #000; }
    .btn-doar    { background: #ff3c00; color: #fff; }
    .btn-doar:hover { background: #e03300; transform: translate(-1px,-2px); box-shadow: 5px 6px 0 #000, 0 0 0 3px #000; }
    .btn-comprar { background: #1a1aff; color: #fff; }
    .btn-comprar:hover { background: #1111dd; transform: translate(-1px,-2px); box-shadow: 5px 6px 0 #000, 0 0 0 3px #000; }

    /* ─── READER ─── */
    #reader {
      position: fixed;
      inset: 0;
      background: #111;
      z-index: 100;
      display: none;
      overflow: hidden;
      touch-action: none;
    }
    #reader.active { display: block; }

    /*
      Stage: the viewport where pages live.
      Two pages sit side by side inside it:
        • #page-a  (left slot  = currently visible)
        • #page-b  (right slot = incoming page)
      We translate the stage to slide them.
    */
    #stage {
      position: absolute;
      /* 200% wide so both pages fit */
      width: 200%;
      height: 100%;
      display: flex;
      will-change: transform;
    }

    .page-slot {
      width: 50%;   /* each slot = 100vw */
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .page-slot img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      display: block;
    }

    /* fold shadow overlay on right edge of page-a while dragging */
    #page-a::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 0;
      height: 100%;
      background: linear-gradient(to left, rgba(0,0,0,0.55), transparent);
      pointer-events: none;
      transition: width 0.05s;
    }
    #stage.dragging #page-a::after { width: 60px; }

    /* close btn */
    #close-btn {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 200;
      background: rgba(0,0,0,0.75);
      color: #ffe100;
      border: 2px solid #ffe100;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.4rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      display: none;
    }
    #close-btn.visible { display: flex; }

    /* counter */
    #page-counter {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border-radius: 20px;
      padding: 5px 18px;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      letter-spacing: 1px;
      display: none;
      white-space: nowrap;
    }
    #page-counter.visible { display: block; }

    /* hint */
    #hint {
      position: fixed;
      bottom: 50px;
      right: 24px;
      z-index: 200;
      color: rgba(255,255,255,0.5);
      font-size: 2rem;
      font-family: Arial, sans-serif;
      animation: hintBounce 1.2s infinite ease-in-out;
      pointer-events: none;
      display: none;
    }
    #hint.visible { display: block; }
    @keyframes hintBounce {
      0%,100% { transform: translateX(0); }
      50%      { transform: translateX(-10px); }
    }

    /* open animation */
    @keyframes openBook {
      0%   { transform: scale(0.05) rotate(-8deg); opacity: 0; }
      60%  { transform: scale(1.04) rotate(1deg);  opacity: 1; }
      100% { transform: scale(1)    rotate(0deg);  opacity: 1; }
    }
    .open-anim { animation: openBook 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
  </style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <button class="btn btn-ler"     onclick="openReader()">Ler HQ</button>
  <button class="btn btn-comprar" onclick="handleComprar()">Comprar</button>
  <button class="btn btn-doar"    onclick="handleDoar()">Doar para o Projeto</button>
</div>

<!-- READER -->
<div id="reader">
  <div id="stage">
    <div class="page-slot" id="page-a"><img id="img-a" src="" alt=""></div>
    <div class="page-slot" id="page-b"><img id="img-b" src="" alt=""></div>
  </div>
</div>

<button id="close-btn" onclick="closeReader()">✕</button>
<div id="page-counter"></div>
<div id="hint">←</div>

<script>
const pages = [
  'capateste4.png',
  'capa1.png',
  'capateste2.png',
  'capateste3.png'
];

let cur        = 0;      // current page index
let busy       = false;  // animation in progress

const readerEl  = document.getElementById('reader');
const stageEl   = document.getElementById('stage');
const imgA      = document.getElementById('img-a');
const imgB      = document.getElementById('img-b');
const closeBtn  = document.getElementById('close-btn');
const counterEl = document.getElementById('page-counter');
const hintEl    = document.getElementById('hint');

/* ─── helpers ─── */
function setCounter() {
  counterEl.textContent = `${cur + 1} / ${pages.length}`;
}

function updateHint() {
  if (cur < pages.length - 1) hintEl.classList.add('visible');
  else hintEl.classList.remove('visible');
}

/* Reset stage to show page-a (left slot) at full screen */
function resetStage(animated) {
  stageEl.style.transition = animated ? 'transform 0.32s cubic-bezier(0.4,0,0.2,1)' : 'none';
  stageEl.style.transform  = 'translateX(0)';
}

/* ─── open / close ─── */
function openReader() {
  cur = 0;
  imgA.src = pages[0];
  imgB.src = '';
  resetStage(false);
  readerEl.classList.add('active');
  closeBtn.classList.add('visible');
  counterEl.classList.add('visible');
  hintEl.classList.add('visible');
  setCounter();
  updateHint();
  // open animation on first page
  imgA.parentElement.classList.remove('open-anim');
  void imgA.parentElement.offsetWidth;
  imgA.parentElement.classList.add('open-anim');
}

function closeReader() {
  readerEl.classList.remove('active');
  closeBtn.classList.remove('visible');
  counterEl.classList.remove('visible');
  hintEl.classList.remove('visible');
  busy = false;
}

/* ─── programmatic flip (keyboard) ─── */
function flipTo(nextIdx, instant) {
  if (busy) return;
  if (nextIdx < 0 || nextIdx >= pages.length) return;

  const goForward = nextIdx > cur;

  if (goForward) {
    // page-b is already at translateX(100vw), load it then slide left
    imgB.src = pages[nextIdx];
    stageEl.style.transition = instant ? 'none' : 'transform 0.38s cubic-bezier(0.4,0,0.2,1)';
    stageEl.style.transform  = 'translateX(-50%)'; // slide left so page-b enters
  } else {
    // going back: put prev page in slot B on the LEFT side
    // Trick: we'll use a different approach — slide right
    imgB.src = pages[nextIdx];
    // temporarily position stage so that B is to the left:
    // stage is 200% wide; if we set it to -50% B is visible, A is off-right
    stageEl.style.transition = 'none';
    stageEl.style.transform  = 'translateX(-50%)'; // B visible, A off-screen right
    // swap: put prev in A, slide back to 0
    void stageEl.offsetWidth;
    imgA.src = pages[nextIdx];
    stageEl.style.transition = instant ? 'none' : 'transform 0.38s cubic-bezier(0.4,0,0.2,1)';
    stageEl.style.transform  = 'translateX(0)';
    cur = nextIdx;
    setCounter();
    updateHint();
    return;
  }

  busy = true;
  const onEnd = () => {
    stageEl.removeEventListener('transitionend', onEnd);
    // after forward flip: promote B → A
    imgA.src = pages[nextIdx];
    imgB.src = '';
    resetStage(false);
    cur = nextIdx;
    busy = false;
    setCounter();
    updateHint();
  };
  if (instant) {
    onEnd();
  } else {
    stageEl.addEventListener('transitionend', onEnd);
  }
}

/* ─── drag / swipe ─── */
let startX   = 0;
let startY   = 0;
let dragging = false;
let dragDir  = 0; // 1 = forward (left), -1 = back (right)
let liveOffset = 0; // current drag translateX in px (as fraction of full width)

readerEl.addEventListener('pointerdown', onDown, { passive: true });
readerEl.addEventListener('pointermove', onMove, { passive: true });
readerEl.addEventListener('pointerup',   onUp);
readerEl.addEventListener('pointercancel', onUp);

function onDown(e) {
  if (busy) return;
  startX   = e.clientX;
  startY   = e.clientY;
  dragging = true;
  dragDir  = 0;
  liveOffset = 0;
}

function onMove(e) {
  if (!dragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  /* lock direction once */
  if (dragDir === 0) {
    if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
    if (Math.abs(dy) > Math.abs(dx)) { dragging = false; return; }
    dragDir = dx < 0 ? 1 : -1;

    if (dragDir === 1 && cur >= pages.length - 1) { dragging = false; return; }
    if (dragDir === -1 && cur <= 0)               { dragging = false; return; }

    stageEl.classList.add('dragging');

    if (dragDir === 1) {
      /* forward: preload next page in slot B */
      imgB.src = pages[cur + 1];
    } else {
      /* backward: put prev page in slot A but shift stage to show B first */
      imgB.src = pages[cur];        // current page goes to B
      imgA.src = pages[cur - 1];    // prev page in A
      /* move stage so B (right slot) is visible = translateX(-50%) */
      stageEl.style.transition = 'none';
      stageEl.style.transform  = 'translateX(-50%)';
      liveOffset = -50; // percent
    }
  }

  const W = window.innerWidth;

  if (dragDir === 1) {
    /* dragging left to go forward: stage goes from 0 → -50% */
    const pct = Math.max(-50, Math.min(0, (dx / W) * 50));
    stageEl.style.transition = 'none';
    stageEl.style.transform  = `translateX(${pct}%)`;
    liveOffset = pct;
  } else {
    /* dragging right to go back: stage goes from -50% → 0 */
    const pct = Math.max(-50, Math.min(0, -50 + (dx / W) * 50));
    stageEl.style.transition = 'none';
    stageEl.style.transform  = `translateX(${pct}%)`;
    liveOffset = pct;
  }
}

function onUp(e) {
  if (!dragging) return;
  dragging = false;
  stageEl.classList.remove('dragging');

  if (dragDir === 0) return;

  const dx    = e.clientX - startX;
  const W     = window.innerWidth;
  const ratio = Math.abs(dx) / W;

  const COMMIT_THRESHOLD = 0.28;

  if (dragDir === 1) {
    /* forward */
    if (ratio >= COMMIT_THRESHOLD) {
      /* commit: finish sliding to -50% */
      busy = true;
      stageEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      stageEl.style.transform  = 'translateX(-50%)';
      stageEl.addEventListener('transitionend', function done() {
        stageEl.removeEventListener('transitionend', done);
        cur += 1;
        imgA.src = pages[cur];
        imgB.src = '';
        stageEl.style.transition = 'none';
        stageEl.style.transform  = 'translateX(0)';
        busy = false;
        setCounter();
        updateHint();
      });
    } else {
      /* cancel: snap back to 0 */
      stageEl.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';
      stageEl.style.transform  = 'translateX(0)';
      imgB.src = '';
      dragDir  = 0;
    }
  } else {
    /* backward */
    if (ratio >= COMMIT_THRESHOLD) {
      /* commit: finish sliding to 0 (A = prev page is now visible) */
      stageEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      stageEl.style.transform  = 'translateX(0)';
      stageEl.addEventListener('transitionend', function done() {
        stageEl.removeEventListener('transitionend', done);
        cur -= 1;
        /* imgA already has prev page, clean up B */
        imgB.src = '';
        busy = false;
        setCounter();
        updateHint();
      });
    } else {
      /* cancel: snap back to -50% (restore current page in B), then swap back */
      stageEl.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';
      stageEl.style.transform  = 'translateX(-50%)';
      stageEl.addEventListener('transitionend', function done() {
        stageEl.removeEventListener('transitionend', done);
        /* restore: current page back in A */
        imgA.src = pages[cur];
        imgB.src = '';
        stageEl.style.transition = 'none';
        stageEl.style.transform  = 'translateX(0)';
        dragDir = 0;
      });
    }
  }
}

/* ─── keyboard ─── */
document.addEventListener('keydown', e => {
  if (!readerEl.classList.contains('active')) return;
  if (e.key === 'ArrowRight' && cur < pages.length - 1) flipTo(cur + 1);
  if (e.key === 'ArrowLeft'  && cur > 0)                flipTo(cur - 1);
  if (e.key === 'Escape') closeReader();
});

/* ─── placeholders ─── */
function handleDoar()    { alert('Em breve! Obrigado pelo apoio ❤️'); }
function handleComprar() { alert('Em breve! Fique ligado 🎉'); }
</script>
</body>
</html>
