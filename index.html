<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HQ Vilão</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Impact','Arial Black',sans-serif;background:#0d0d0d}

    #landing{
      position:fixed;inset:0;
      background:url('capateste4.png') center top/cover no-repeat;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:22px;z-index:10;
    }
    #landing::before{content:'';position:absolute;inset:0;
      background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.62))}

    /* ── NEO-TECH BUTTON SYSTEM ── */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Bungee+Outline&display=swap');

    .btn-wrap{position:relative;z-index:1;width:260px}

    .btn{
      position:relative;
      width:100%;
      padding:15px 0;
      border:none;
      outline:none;
      cursor:pointer;
      font-family:'Bungee Outline',sans-serif;
      font-size:1.1rem;
      font-weight:400;
      letter-spacing:3px;
      text-transform:uppercase;
      color: transparent;
      background:linear-gradient(135deg, #c084fc 0%, #a855f7 35%, #7c3aed 65%, #c084fc 100%);
      clip-path:polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition:filter .2s, transform .15s;
      filter:drop-shadow(0 0 8px rgba(168,85,247,.7)) drop-shadow(0 0 20px rgba(168,85,247,.35));
    }

    /* scan-line shimmer overlay */
    .btn::before{
      content:'';
      position:absolute;inset:0;
      background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events:none;
    }

    /* animated top border glow line */
    .btn::after{
      content:'';
      position:absolute;
      top:0;left:10%;
      width:80%;height:2px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);
      opacity:.7;
    }

    .btn:hover{
      background-position:100% 100%;
      filter:drop-shadow(0 0 14px rgba(192,132,252,1)) drop-shadow(0 0 36px rgba(168,85,247,.6));
      transform:translateY(-2px) scaleX(1.02);
    }
    .btn:active{
      transform:translateY(1px) scaleX(.99);
      filter:drop-shadow(0 0 6px rgba(168,85,247,.5));
    }

    /* corner tick marks */
    .btn-wrap::before,
    .btn-wrap::after{
      content:'';
      position:absolute;
      width:8px;height:8px;
      border-color:#e879f9;
      border-style:solid;
      z-index:2;
      pointer-events:none;
    }
    .btn-wrap::before{top:-3px;left:14px;border-width:2px 0 0 2px;}
    .btn-wrap::after {bottom:-3px;right:14px;border-width:0 2px 2px 0;}

    /* label text inside button — small tech tag above */
    .btn-tag{
      display:block;
      font-family:'Orbitron','Impact',sans-serif;
      font-size:.55rem;
      letter-spacing:4px;
      color:#d946ef;
      text-align:right;
      padding-right:20px;
      margin-bottom:2px;
      opacity:.8;
      text-shadow:0 0 8px #d946ef;
    }

    #reader{position:fixed;inset:0;background:#0d0d0d;z-index:100;display:none;touch-action:none}
    #reader.active{display:block}
    #flip-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

    #close-btn{position:fixed;top:14px;right:18px;z-index:200;
      background:rgba(0,0,0,.75);color:#ffe100;border:2px solid #ffe100;
      border-radius:50%;width:42px;height:42px;font-size:1.4rem;cursor:pointer;
      display:none;align-items:center;justify-content:center;font-family:Arial,sans-serif}
    #close-btn.visible{display:flex}
    #page-counter{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
      z-index:200;background:rgba(0,0,0,.65);color:#fff;border-radius:20px;
      padding:5px 18px;font-size:.85rem;font-family:Arial,sans-serif;
      letter-spacing:1px;display:none;white-space:nowrap}
    #page-counter.visible{display:block}
    #hint{position:fixed;bottom:50px;right:24px;z-index:200;
      color:rgba(255,255,255,.45);font-size:2rem;font-family:Arial,sans-serif;
      animation:hintBounce 1.2s infinite ease-in-out;pointer-events:none;display:none}
    #hint.visible{display:block}
    @keyframes hintBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(-10px)}}
  </style>
</head>
<body>

<div id="landing">
  <div class="btn-wrap">
    <span class="btn-tag">// LEITURA</span>
    <button class="btn" onclick="openReader()">
      <svg width="100%" height="36" viewBox="0 0 220 36" preserveAspectRatio="xMidYMid meet">
        <text x="50%" y="28" text-anchor="middle"
          font-family="'Orbitron',sans-serif" font-weight="900" font-size="22"
          fill="none" stroke="#000" stroke-width="1.2" letter-spacing="4">LER HQ</text>
      </svg>
    </button>
  </div>
  <div class="btn-wrap">
    <span class="btn-tag">// AQUISIÇÃO</span>
    <button class="btn" onclick="handleComprar()">
      <svg width="100%" height="36" viewBox="0 0 220 36" preserveAspectRatio="xMidYMid meet">
        <text x="50%" y="28" text-anchor="middle"
          font-family="'Orbitron',sans-serif" font-weight="900" font-size="22"
          fill="none" stroke="#000" stroke-width="1.2" letter-spacing="4">COMPRAR</text>
      </svg>
    </button>
  </div>
  <div class="btn-wrap">
    <span class="btn-tag">// SUPORTE</span>
    <button class="btn" onclick="handleDoar()">
      <svg width="100%" height="36" viewBox="0 0 220 36" preserveAspectRatio="xMidYMid meet">
        <text x="50%" y="28" text-anchor="middle"
          font-family="'Orbitron',sans-serif" font-weight="900" font-size="18"
          fill="none" stroke="#000" stroke-width="1.2" letter-spacing="3">DOAR AO PROJETO</text>
      </svg>
    </button>
  </div>
</div>

<div id="reader"><canvas id="flip-canvas"></canvas></div>
<button id="close-btn" onclick="closeReader()">✕</button>
<div id="page-counter"></div>
<div id="hint">←</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   HQ VILÃO  —  Page Flip Engine v4
   Inspired by the turn.js / "20things" canvas technique:
   • Bézier-curved fold line (paper bends, not a straight crease)
   • Four rendering layers: back page | reveal page | fold flap | shadow
   • Fold width driven by fold.progress (0=edge → 1=fully turned)
   • Paper gradient simulates reflected light on the curl
   • Works identically for forward (left) and backward (right) swipe
═══════════════════════════════════════════════════════════════════ */

const PAGES = ['capateste4.png','capa1.png','capateste2.png','capateste3.png'];
const imgs  = PAGES.map(s=>{ const i=new Image(); i.src=s; return i; });

let cur  = 0;
let busy = false;

const readerEl  = document.getElementById('reader');
const canvas    = document.getElementById('flip-canvas');
const ctx       = canvas.getContext('2d');
const closeBtn  = document.getElementById('close-btn');
const counterEl = document.getElementById('page-counter');
const hintEl    = document.getElementById('hint');

/* ── resize ── */
function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if(readerEl.classList.contains('active')) drawStatic();
}
window.addEventListener('resize', resize);

function setCounter(){ counterEl.textContent=`${cur+1} / ${PAGES.length}`; }
function updateHint(){ cur<PAGES.length-1 ? hintEl.classList.add('visible') : hintEl.classList.remove('visible'); }

/* ── fit image rect ── */
function imgRect(img){
  if(!img||!img.naturalWidth) return {x:0,y:0,w:0,h:0};
  const s = Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight);
  const w = img.naturalWidth*s, h = img.naturalHeight*s;
  return { x:(canvas.width-w)/2, y:(canvas.height-h)/2, w, h };
}

function drawPage(img, clipX, clipW){
  /* draw img, optionally clipped to a vertical band [clipX .. clipX+clipW] */
  if(!img||!img.complete||!img.naturalWidth) return;
  const r = imgRect(img);
  if(clipW !== undefined){
    ctx.save();
    ctx.beginPath();
    ctx.rect(clipX, 0, clipW, canvas.height);
    ctx.clip();
    ctx.drawImage(img, r.x, r.y, r.w, r.h);
    ctx.restore();
  } else {
    ctx.drawImage(img, r.x, r.y, r.w, r.h);
  }
}

function drawStatic(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawPage(imgs[cur]);
}

/* ═══════════════════════════════════════════════════════════════════
   CORE FLIP RENDERER

   Parameters:
     t      : 0..1  flip progress (0=just started, 1=fully done)
     fwd    : true=going forward (swipe left), false=going back (swipe right)

   Geometry (forward flip):
   ─────────────────────────
   The page is turning from RIGHT side:
     • foldX   = right side of page → moves toward left as t increases
                 foldX = W - t*W  (starts at W, ends at 0)
     • foldW   = width of the visible fold face (the curl)
                 = W * 0.5 * (1-t)   — shrinks as it approaches spine
     • strength = 1 - t  (how curved the fold is; max at start)
     • The fold face is a quadrilateral with bezier-curved top and bottom
       edges to simulate paper bending outward

   Layers (front to back):
     1. [bottom] Next page — full, underneath everything
     2. Current page clipped to the "already turned" left region  [0..foldX]
        (this is actually wrong — we DON'T draw current on left; next shows through)
        Actually: current page on RIGHT of fold, next page revealed on LEFT
     3. Fold flap (trapezoid + curve) — the curling part, shows
        a reflected/mirrored slice of current page
     4. Shadows cast by the fold

   Backward flip is mirrored: fold comes from LEFT side.
═══════════════════════════════════════════════════════════════════ */

function drawFlip(t, fwd){
  const W = canvas.width, H = canvas.height;
  const nxtIdx = fwd ? cur+1 : cur-1;
  const curImg = imgs[cur];
  const nxtImg = imgs[nxtIdx];

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,W,H);

  if(fwd){
    /* ── FORWARD: fold comes from right edge, moves left ── */
    const foldX    = W * (1-t);                  /* x of the fold axis */
    const foldW    = Math.max(2, W * 0.45 * (1-t)); /* visible width of curl face */
    const strength = 1-t;                         /* curvature intensity */
    const outdent  = 28 * strength;               /* how much the curve bulges */

    /* 1. NEXT PAGE — full, underneath */
    drawPage(nxtImg);

    /* 2. CURRENT PAGE — only right portion (not yet turned) */
    if(foldX < W){
      drawPage(curImg, foldX, W - foldX);
      /* shadow on left edge of remaining portion */
      ctx.save();
      ctx.beginPath(); ctx.rect(foldX, 0, W-foldX, H); ctx.clip();
      const sg = ctx.createLinearGradient(foldX,0, foldX+Math.min(60,W*0.08),0);
      sg.addColorStop(0,'rgba(0,0,0,0.65)');
      sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg; ctx.fillRect(foldX,0,Math.min(60,W*0.08),H);
      ctx.restore();
    } else {
      drawPage(curImg);
    }

    /* 3. FOLD FLAP — the curling strip */
    if(foldW > 1){
      const flL = foldX - foldW;   /* left edge of fold face  */
      const flR = foldX;            /* right edge = fold axis  */

      /* Bézier-curved clipping path for the fold face
         Top edge curves outward, bottom edge mirrors it */
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(flR, 0);
      ctx.bezierCurveTo(
        flR - foldW*0.3, outdent,
        flL + foldW*0.3, outdent,
        flL, outdent * 1.5
      );
      ctx.lineTo(flL, H - outdent*1.5);
      ctx.bezierCurveTo(
        flL + foldW*0.3, H - outdent,
        flR - foldW*0.3, H - outdent,
        flR, H
      );
      ctx.closePath();
      ctx.clip();

      /* Fill with reflected portion of current page (squished = perspective) */
      if(curImg&&curImg.complete&&curImg.naturalWidth){
        const r = imgRect(curImg);
        /* source: the right slice of curImg that matches this fold position */
        const sx  = Math.max(0, (foldX - r.x) / r.w * curImg.naturalWidth);
        const sw  = Math.max(1, curImg.naturalWidth - sx);
        /* destination: map into fold face width, mirrored horizontally */
        ctx.save();
        ctx.translate(flR, 0);
        ctx.scale(-1, 1); /* mirror — back of page */
        ctx.drawImage(curImg, sx, 0, sw, curImg.naturalHeight,
          0, r.y, foldW, r.h);
        ctx.restore();
      }

      /* Paper sheen gradient over the fold face — light reflecting off curl */
      const pg = ctx.createLinearGradient(flL, 0, flR, 0);
      pg.addColorStop(0,   'rgba(0,0,0,0.25)');
      pg.addColorStop(0.4, 'rgba(0,0,0,0.05)');
      pg.addColorStop(0.7, 'rgba(255,255,255,0.12)');
      pg.addColorStop(0.9, 'rgba(255,255,255,0.32)');
      pg.addColorStop(1,   'rgba(255,255,255,0.18)');
      ctx.fillStyle=pg; ctx.fillRect(flL-2,0,foldW+2,H);

      ctx.restore();
    }

    /* 4. FOLD SHADOW cast onto next page to the left */
    if(foldX > 2){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,foldX,H); ctx.clip();
      const castW = Math.min(100, foldX * 0.4);
      const cg = ctx.createLinearGradient(foldX-castW,0, foldX,0);
      cg.addColorStop(0,'rgba(0,0,0,0)');
      cg.addColorStop(1,`rgba(0,0,0,${0.5*strength})`);
      ctx.fillStyle=cg; ctx.fillRect(foldX-castW,0,castW,H);
      ctx.restore();
    }

    /* 5. CREASE LINE — bright line at fold axis */
    if(t>0.01 && t<0.99){
      const cl = ctx.createLinearGradient(0,0,0,H);
      cl.addColorStop(0,'rgba(255,255,255,0.04)');
      cl.addColorStop(0.5,'rgba(255,255,255,0.55)');
      cl.addColorStop(1,'rgba(255,255,255,0.04)');
      ctx.strokeStyle=cl; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(foldX,0); ctx.lineTo(foldX,H); ctx.stroke();
    }

  } else {
    /* ── BACKWARD: fold comes from left edge, moves right ── */
    const foldX    = W * t;
    const foldW    = Math.max(2, W * 0.45 * (1-t));
    const strength = 1-t;
    const outdent  = 28 * strength;

    /* 1. PREV PAGE underneath */
    drawPage(nxtImg);

    /* 2. CURRENT PAGE — left portion remaining */
    if(foldX > 0){
      drawPage(curImg, 0, foldX);
      /* shadow on right edge */
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,foldX,H); ctx.clip();
      const sw = Math.min(60, W*0.08);
      const sg = ctx.createLinearGradient(foldX-sw,0, foldX,0);
      sg.addColorStop(0,'rgba(0,0,0,0)');
      sg.addColorStop(1,'rgba(0,0,0,0.65)');
      ctx.fillStyle=sg; ctx.fillRect(foldX-sw,0,sw,H);
      ctx.restore();
    } else {
      drawPage(curImg);
    }

    /* 3. FOLD FLAP */
    if(foldW > 1){
      const flL = foldX;
      const flR = foldX + foldW;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(flL, 0);
      ctx.bezierCurveTo(
        flL + foldW*0.3, outdent,
        flR - foldW*0.3, outdent,
        flR, outdent*1.5
      );
      ctx.lineTo(flR, H - outdent*1.5);
      ctx.bezierCurveTo(
        flR - foldW*0.3, H - outdent,
        flL + foldW*0.3, H - outdent,
        flL, H
      );
      ctx.closePath();
      ctx.clip();

      /* Reflected slice of current page */
      if(curImg&&curImg.complete&&curImg.naturalWidth){
        const r = imgRect(curImg);
        const srcRight = Math.min(curImg.naturalWidth,
          (foldX - r.x) / r.w * curImg.naturalWidth);
        const sw2 = Math.max(1, srcRight);
        /* mirror: left side reflects to the right */
        ctx.save();
        ctx.translate(flL, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(curImg, 0, 0, sw2, curImg.naturalHeight,
          -foldW, r.y, foldW, r.h);
        ctx.restore();
      }

      /* Sheen */
      const pg = ctx.createLinearGradient(flL, 0, flR, 0);
      pg.addColorStop(0,   'rgba(255,255,255,0.18)');
      pg.addColorStop(0.1, 'rgba(255,255,255,0.32)');
      pg.addColorStop(0.3, 'rgba(255,255,255,0.12)');
      pg.addColorStop(0.6, 'rgba(0,0,0,0.05)');
      pg.addColorStop(1,   'rgba(0,0,0,0.25)');
      ctx.fillStyle=pg; ctx.fillRect(flL,0,foldW+2,H);

      ctx.restore();
    }

    /* 4. Cast shadow to the right */
    if(foldX < W-2){
      ctx.save();
      ctx.beginPath(); ctx.rect(foldX,0,W-foldX,H); ctx.clip();
      const castW = Math.min(100,(W-foldX)*0.4);
      const cg = ctx.createLinearGradient(foldX,0, foldX+castW,0);
      cg.addColorStop(0,`rgba(0,0,0,${0.5*strength})`);
      cg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=cg; ctx.fillRect(foldX,0,castW,H);
      ctx.restore();
    }

    /* 5. Crease line */
    if(t>0.01 && t<0.99){
      const cl = ctx.createLinearGradient(0,0,0,H);
      cl.addColorStop(0,'rgba(255,255,255,0.04)');
      cl.addColorStop(0.5,'rgba(255,255,255,0.55)');
      cl.addColorStop(1,'rgba(255,255,255,0.04)');
      ctx.strokeStyle=cl; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(foldX,0); ctx.lineTo(foldX,H); ctx.stroke();
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATION — lerp toward target at 60fps (turn.js style)
   flip.progress += (flip.target - flip.progress) * speed
   This gives natural ease-out without spring overshoot.
═══════════════════════════════════════════════════════════════ */
const flip = {
  active:   false,
  fwd:      true,
  progress: 0,      /* 0..1 */
  target:   0,
  velocity: 0,
  raf:      null,
  onDone:   null
};

const LERP_SPEED = 0.14;   /* higher = faster, lower = smoother */
const LERP_SNAP  = 0.001;

function flipLoop(){
  flip.raf = requestAnimationFrame(flipLoop);

  flip.progress += (flip.target - flip.progress) * LERP_SPEED;

  drawFlip(Math.max(0,Math.min(1,flip.progress)), flip.fwd);

  if(Math.abs(flip.target - flip.progress) < LERP_SNAP){
    flip.progress = flip.target;
    cancelAnimationFrame(flip.raf); flip.raf = null;
    if(flip.target === 1){
      const cb = flip.onDone;
      flip.active = false; flip.progress = 0; flip.target = 0;
      if(cb) cb();
    } else {
      flip.active = false;
      drawStatic();
    }
  }
}

function startFlipTo(fwd, target, onDone){
  if(flip.raf){ cancelAnimationFrame(flip.raf); flip.raf=null; }
  flip.active   = true;
  flip.fwd      = fwd;
  flip.target   = target;
  flip.onDone   = onDone || null;
  if(!flip.raf) flip.raf = requestAnimationFrame(flipLoop);
}

/* ═══════════════════════════════════════════════════════════════
   OPEN / CLOSE
═══════════════════════════════════════════════════════════════ */
function openReader(){
  cur=0; busy=false;
  readerEl.classList.add('active');
  closeBtn.classList.add('visible');
  counterEl.classList.add('visible');
  resize(); setCounter(); updateHint();
  /* zoom open */
  let t0=performance.now();
  function step(now){
    const t=Math.min(1,(now-t0)/480);
    const e=1-Math.pow(1-t,3);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    const s=0.04+0.96*e, cx=canvas.width/2, cy=canvas.height/2;
    ctx.translate(cx,cy); ctx.scale(s,s); ctx.translate(-cx,-cy);
    drawPage(imgs[0]); ctx.restore();
    if(t<1) requestAnimationFrame(step);
    else { drawStatic(); hintEl.classList.add('visible'); }
  }
  requestAnimationFrame(step);
}

function closeReader(){
  if(flip.raf){ cancelAnimationFrame(flip.raf); flip.raf=null; }
  busy=false; dragging=false; flip.active=false; flip.progress=0; flip.target=0;
  readerEl.classList.remove('active');
  closeBtn.classList.remove('visible');
  counterEl.classList.remove('visible');
  hintEl.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════════════
   DRAG / SWIPE
═══════════════════════════════════════════════════════════════ */
let dragging=false, startX=0, startY=0, dragFwd=true, dragT=0, dirLocked=false;

readerEl.addEventListener('pointerdown', onDown, {passive:true});
readerEl.addEventListener('pointermove', onMove, {passive:true});
readerEl.addEventListener('pointerup',   onUp);
readerEl.addEventListener('pointercancel', onUp);

function onDown(e){
  if(busy) return;
  if(flip.raf){ cancelAnimationFrame(flip.raf); flip.raf=null; }
  flip.active=false;
  startX=e.clientX; startY=e.clientY;
  dragging=true; dragT=0; dirLocked=false;
}

function onMove(e){
  if(!dragging) return;
  const dx=e.clientX-startX, dy=e.clientY-startY;
  if(!dirLocked){
    if(Math.abs(dx)<5 && Math.abs(dy)<5) return;
    if(Math.abs(dy)>Math.abs(dx)){ dragging=false; return; }
    dragFwd = dx < 0;
    if(dragFwd && cur>=PAGES.length-1){ dragging=false; return; }
    if(!dragFwd && cur<=0)            { dragging=false; return; }
    dirLocked=true;
  }
  dragT = Math.max(0, Math.min(1, Math.abs(dx)/canvas.width));
  /* drive flip.progress directly while dragging */
  flip.progress = dragT;
  flip.fwd      = dragFwd;
  drawFlip(dragT, dragFwd);
}

function onUp(e){
  if(!dragging){ dragging=false; return; }
  dragging=false;
  if(!dirLocked){ drawStatic(); return; }

  if(dragT >= 0.28){
    busy=true;
    flip.progress = dragT;
    startFlipTo(dragFwd, 1, ()=>{
      cur += dragFwd ? 1 : -1;
      busy=false; setCounter(); updateHint();
    });
  } else {
    flip.progress = dragT;
    startFlipTo(dragFwd, 0, null);
  }
}

/* ═══════════════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e=>{
  if(!readerEl.classList.contains('active')||busy) return;
  if(e.key==='ArrowRight'&&cur<PAGES.length-1){
    busy=true; flip.progress=0;
    startFlipTo(true, 1, ()=>{ cur++; busy=false; setCounter(); updateHint(); });
  }
  if(e.key==='ArrowLeft'&&cur>0){
    busy=true; flip.progress=0;
    startFlipTo(false, 1, ()=>{ cur--; busy=false; setCounter(); updateHint(); });
  }
  if(e.key==='Escape') closeReader();
});

function handleComprar(){ alert('Em breve! Fique ligado 🎉'); }
