<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HQ Vilão</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Impact','Arial Black',sans-serif}

    #landing{
      position:fixed;inset:0;
      background:url('capateste4.png') center top/cover no-repeat;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:18px;z-index:10;
    }
    #landing::before{content:'';position:absolute;inset:0;
      background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.5))}
    .btn{position:relative;z-index:1;width:240px;padding:16px 0;border:none;
      border-radius:6px;font-size:1.25rem;font-family:'Impact','Arial Black',sans-serif;
      letter-spacing:2px;text-transform:uppercase;cursor:pointer;
      transition:transform .12s,box-shadow .12s;
      box-shadow:4px 4px 0 #000,0 0 0 3px #000;outline:none}
    .btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000,0 0 0 3px #000}
    .btn-ler    {background:#ffe100;color:#000}
    .btn-ler:hover{background:#ffd000;transform:translate(-1px,-2px);box-shadow:5px 6px 0 #000,0 0 0 3px #000}
    .btn-doar   {background:#ff3c00;color:#fff}
    .btn-doar:hover{background:#e03300;transform:translate(-1px,-2px);box-shadow:5px 6px 0 #000,0 0 0 3px #000}
    .btn-comprar{background:#1a1aff;color:#fff}
    .btn-comprar:hover{background:#1111dd;transform:translate(-1px,-2px);box-shadow:5px 6px 0 #000,0 0 0 3px #000}

    #reader{position:fixed;inset:0;background:#0d0d0d;z-index:100;display:none;touch-action:none}
    #reader.active{display:block}
    #flip-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

    #close-btn{position:fixed;top:14px;right:18px;z-index:200;
      background:rgba(0,0,0,.75);color:#ffe100;border:2px solid #ffe100;
      border-radius:50%;width:42px;height:42px;font-size:1.4rem;cursor:pointer;
      align-items:center;justify-content:center;font-family:Arial,sans-serif;display:none}
    #close-btn.visible{display:flex}

    #page-counter{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
      z-index:200;background:rgba(0,0,0,.65);color:#fff;border-radius:20px;
      padding:5px 18px;font-size:.85rem;font-family:Arial,sans-serif;
      letter-spacing:1px;display:none;white-space:nowrap}
    #page-counter.visible{display:block}

    #hint{position:fixed;bottom:50px;right:24px;z-index:200;
      color:rgba(255,255,255,.45);font-size:2rem;font-family:Arial,sans-serif;
      animation:hintBounce 1.2s infinite ease-in-out;pointer-events:none;display:none}
    #hint.visible{display:block}
    @keyframes hintBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(-10px)}}
  </style>
</head>
<body>

<div id="landing">
  <button class="btn btn-ler"     onclick="openReader()">Ler HQ</button>
  <button class="btn btn-comprar" onclick="handleComprar()">Comprar</button>
  <button class="btn btn-doar"    onclick="handleDoar()">Doar para o Projeto</button>
</div>

<div id="reader"><canvas id="flip-canvas"></canvas></div>
<button id="close-btn" onclick="closeReader()">✕</button>
<div id="page-counter"></div>
<div id="hint">←</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   HQ VILÃO — Page Flip Engine v3

   Forward flip  (swipe left):  crease starts at RIGHT edge → moves LEFT
     • Right side of current page stays, left side peels as trapezoid flap
     • Flap front = current page (mirrored/compressed)
     • Reveals next page on the left as flap moves

   Backward flip (swipe right): crease starts at LEFT edge → moves RIGHT
     • Left side of current page stays, right side peels as trapezoid flap
     • Flap front = current page (mirrored/compressed)
     • Reveals prev page on the right as flap moves
═══════════════════════════════════════════════════════════════ */

const PAGES = ['capateste4.png','capa1.png','capateste2.png','capateste3.png'];
const imgs  = PAGES.map(s => { const i=new Image(); i.src=s; return i; });

let cur  = 0;
let busy = false;

const readerEl  = document.getElementById('reader');
const canvas    = document.getElementById('flip-canvas');
const ctx       = canvas.getContext('2d');
const closeBtn  = document.getElementById('close-btn');
const counterEl = document.getElementById('page-counter');
const hintEl    = document.getElementById('hint');

/* ── resize ── */
function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if(readerEl.classList.contains('active')) drawStatic();
}
window.addEventListener('resize', resize);

/* ── utils ── */
function setCounter(){ counterEl.textContent=`${cur+1} / ${PAGES.length}`; }
function updateHint(){ cur<PAGES.length-1?hintEl.classList.add('visible'):hintEl.classList.remove('visible'); }

function imgRect(img){
  const cw=canvas.width, ch=canvas.height;
  const s=Math.min(cw/img.naturalWidth, ch/img.naturalHeight);
  const w=img.naturalWidth*s, h=img.naturalHeight*s;
  return {x:(cw-w)/2, y:(ch-h)/2, w, h};
}

function drawPage(img){
  if(!img||!img.complete||!img.naturalWidth) return;
  const r=imgRect(img);
  ctx.drawImage(img, r.x, r.y, r.w, r.h);
}

function drawStatic(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawPage(imgs[cur]);
}

/* ═══════════════════════════════════════════════════════════════
   drawFlip(t, fwd)

   t    : 0..1  (progress of the flip)
   fwd  : true = flipping forward (left swipe), false = backward (right swipe)

   The core geometry:

   FORWARD (fwd=true):
     creaseX  = W*(1-t)          — starts at W, moves to 0

     Layer A: next page — full canvas underneath
     Layer B: current page — clipped to [creaseX..W]  (right remainder)
              with shadow gradient on its left edge
     Layer C: flap — trapezoid to the LEFT of crease
              left edge is compressed (perspX = creaseX - flapW*(1-t*k))
              draws current page horizontally mirrored onto it
              highlight on right edge (crease side)
     Layer D: cast shadow on next page, just left of crease

   BACKWARD (fwd=false):
     creaseX  = W*t              — starts at 0, moves to W

     Layer A: prev page — full canvas underneath
     Layer B: current page — clipped to [0..creaseX]  (left remainder)
              shadow on its right edge
     Layer C: flap — trapezoid to the RIGHT of crease
              right edge compressed (perspective on opposite side)
              draws current page mirrored onto it
              highlight on left edge (crease side)
     Layer D: cast shadow on prev page, just right of crease
═══════════════════════════════════════════════════════════════ */

function drawFlip(t, fwd){
  const W=canvas.width, H=canvas.height;
  const nxtIdx = fwd ? cur+1 : cur-1;
  const curImg = imgs[cur];
  const nxtImg = imgs[nxtIdx];

  /* background */
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,W,H);

  if(fwd){
    /* ── FORWARD FLIP ── */

    /* crease moves from right to left */
    const creaseX = W*(1-t);

    /* Layer A: next page underneath */
    drawPage(nxtImg);

    /* Layer B: remaining right portion of current page */
    if(creaseX < W){
      ctx.save();
      ctx.beginPath(); ctx.rect(creaseX,0,W-creaseX,H); ctx.clip();
      drawPage(curImg);

      /* shadow on left edge of remaining portion */
      const sw = Math.min(80, (W-creaseX)*0.25);
      const sg = ctx.createLinearGradient(creaseX,0,creaseX+sw,0);
      sg.addColorStop(0,'rgba(0,0,0,0.7)');
      sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg; ctx.fillRect(creaseX,0,sw,H);
      ctx.restore();
    } else {
      drawPage(curImg);
    }

    /* Layer C: the peeling flap (trapezoid left of crease) */
    /*
       The flap represents the part of the current page that has bent away.
       Its right edge = creaseX (full height)
       Its left edge  = creaseX - flapW (compressed height = perspective)

       flapW grows as crease moves left: flapW = t * W * 0.72
       At t=1 crease is at 0, flapW ≈ 0.72W → flap fills most of screen
    */
    const flapW    = t * W * 0.72;
    const flapR    = creaseX;
    const flapL    = creaseX - flapW;

    /* perspective: left edge height shrinks as t grows (paper curling away) */
    const perspH   = H * (1 - t * 0.52);
    const flapTopL = (H - perspH) / 2;
    const flapBotL = H - flapTopL;
    const flapTopR = 0;
    const flapBotR = H;

    if(flapW > 0.5){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(flapR, flapTopR);
      ctx.lineTo(flapR, flapBotR);
      ctx.lineTo(flapL, flapBotL);
      ctx.lineTo(flapL, flapTopL);
      ctx.closePath();
      ctx.clip();

      /*
        Draw current page onto flap — mirrored horizontally
        The flap shows the BACK of the page being turned.
        We map: the right portion of curImg (from creaseX onward)
        compressed horizontally into flapW, mirrored.
      */
      if(curImg && curImg.complete && curImg.naturalWidth){
        const r = imgRect(curImg);
        /* what fraction of the image is still visible on the right side */
        const imgCreaseFrac = (creaseX - r.x) / r.w;
        const srcX = imgCreaseFrac * curImg.naturalWidth;
        const srcW = curImg.naturalWidth - srcX; /* remaining right portion */

        ctx.save();
        /* mirror: flip horizontally around creaseX */
        ctx.translate(flapR, 0);
        ctx.scale(-1, 1);
        ctx.translate(0, 0);

        /* draw the right portion of curImg, squished into flapW */
        const destW = flapW;
        const destH = H;
        const destX = 0;
        const destY = 0;

        /* We want the image to appear to compress top/bottom at the far end.
           Since we can't do true perspective in canvas 2D without hacks,
           we draw the image normally then rely on the trapezoid clip
           to give the perspective illusion. */
        if(srcW > 0){
          ctx.drawImage(
            curImg,
            Math.max(0, srcX), 0, Math.max(1, srcW), curImg.naturalHeight,
            destX, r.y, destW, r.h
          );
        }
        ctx.restore();
      }

      /* darken the flap (it's the back of the page — slightly shaded) */
      ctx.fillStyle='rgba(20,10,5,0.22)';
      ctx.fillRect(flapL, 0, flapW, H);

      /* highlight strip along crease (right edge) — light catching the bend */
      const hlW = Math.min(22, flapW*0.12);
      const hl = ctx.createLinearGradient(flapR-hlW,0,flapR,0);
      hl.addColorStop(0,'rgba(255,255,255,0)');
      hl.addColorStop(0.6,'rgba(255,255,220,0.28)');
      hl.addColorStop(1,'rgba(255,255,255,0.55)');
      ctx.fillStyle=hl; ctx.fillRect(flapR-hlW,0,hlW,H);

      /* shadow on far left edge of flap */
      const shW2 = Math.min(50, flapW*0.18);
      const sh2 = ctx.createLinearGradient(flapL,0,flapL+shW2,0);
      sh2.addColorStop(0,'rgba(0,0,0,0.75)');
      sh2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sh2; ctx.fillRect(flapL,0,shW2,H);

      ctx.restore();
    }

    /* Layer D: crease line */
    if(t>0.005 && t<0.995 && creaseX>0){
      const cl = ctx.createLinearGradient(0,0,0,H);
      cl.addColorStop(0,'rgba(255,255,255,0.05)');
      cl.addColorStop(0.5,'rgba(255,255,255,0.5)');
      cl.addColorStop(1,'rgba(255,255,255,0.05)');
      ctx.strokeStyle=cl; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(creaseX,0); ctx.lineTo(creaseX,H); ctx.stroke();
    }

    /* Layer E: cast shadow to the left on next page */
    if(t>0.01 && creaseX>1){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,creaseX,H); ctx.clip();
      const castW = Math.min(90, creaseX*0.35);
      const castX = Math.max(0, creaseX-castW);
      const cg = ctx.createLinearGradient(castX,0,creaseX,0);
      cg.addColorStop(0,'rgba(0,0,0,0)');
      cg.addColorStop(1,`rgba(0,0,0,${Math.min(0.5, t*0.6)})`);
      ctx.fillStyle=cg; ctx.fillRect(castX,0,castW,H);
      ctx.restore();
    }

  } else {
    /* ── BACKWARD FLIP ── */

    /* crease moves from left to right */
    const creaseX = W * t;

    /* Layer A: prev page underneath */
    drawPage(nxtImg);

    /* Layer B: remaining left portion of current page */
    if(creaseX > 0){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,creaseX,H); ctx.clip();
      drawPage(curImg);

      /* shadow on right edge of remaining left portion */
      const sw = Math.min(80, creaseX*0.25);
      const sg = ctx.createLinearGradient(creaseX-sw,0,creaseX,0);
      sg.addColorStop(0,'rgba(0,0,0,0)');
      sg.addColorStop(1,'rgba(0,0,0,0.7)');
      ctx.fillStyle=sg; ctx.fillRect(creaseX-sw,0,sw,H);
      ctx.restore();
    } else {
      drawPage(curImg);
    }

    /* Layer C: the peeling flap (trapezoid right of crease) */
    const flapW    = t * W * 0.72;
    const flapL    = creaseX;
    const flapR    = creaseX + flapW;

    /* perspective on the right (far) side — mirrors forward case */
    const perspH   = H * (1 - t * 0.52);
    const flapTopR = (H - perspH) / 2;
    const flapBotR = H - flapTopR;
    const flapTopL = 0;
    const flapBotL = H;

    if(flapW > 0.5){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(flapL, flapTopL);
      ctx.lineTo(flapL, flapBotL);
      ctx.lineTo(flapR, flapBotR);
      ctx.lineTo(flapR, flapTopR);
      ctx.closePath();
      ctx.clip();

      /* Draw current page onto flap — mirrored horizontally (back of page) */
      if(curImg && curImg.complete && curImg.naturalWidth){
        const r = imgRect(curImg);
        /* left portion of the image being peeled */
        const imgCreaseFrac = (creaseX - r.x) / r.w;
        const srcX = 0;
        const srcW = imgCreaseFrac * curImg.naturalWidth;

        ctx.save();
        /* mirror around creaseX */
        ctx.translate(flapL, 0);
        ctx.scale(1, 1); /* no horizontal flip — backward shows left side */

        if(srcW > 0){
          ctx.drawImage(
            curImg,
            0, 0, Math.max(1, srcW), curImg.naturalHeight,
            0, r.y, flapW, r.h
          );
        }
        ctx.restore();
      }

      /* darken the flap */
      ctx.fillStyle='rgba(20,10,5,0.22)';
      ctx.fillRect(flapL,0,flapW,H);

      /* highlight on left edge (crease side) */
      const hlW = Math.min(22, flapW*0.12);
      const hl = ctx.createLinearGradient(flapL,0,flapL+hlW,0);
      hl.addColorStop(0,'rgba(255,255,255,0.55)');
      hl.addColorStop(0.4,'rgba(255,255,220,0.28)');
      hl.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=hl; ctx.fillRect(flapL,0,hlW,H);

      /* shadow on far right edge of flap */
      const shW2 = Math.min(50, flapW*0.18);
      const sh2 = ctx.createLinearGradient(flapR-shW2,0,flapR,0);
      sh2.addColorStop(0,'rgba(0,0,0,0)');
      sh2.addColorStop(1,'rgba(0,0,0,0.75)');
      ctx.fillStyle=sh2; ctx.fillRect(flapR-shW2,0,shW2,H);

      ctx.restore();
    }

    /* crease line */
    if(t>0.005 && t<0.995 && creaseX<W){
      const cl = ctx.createLinearGradient(0,0,0,H);
      cl.addColorStop(0,'rgba(255,255,255,0.05)');
      cl.addColorStop(0.5,'rgba(255,255,255,0.5)');
      cl.addColorStop(1,'rgba(255,255,255,0.05)');
      ctx.strokeStyle=cl; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(creaseX,0); ctx.lineTo(creaseX,H); ctx.stroke();
    }

    /* cast shadow to the right on prev page */
    if(t>0.01 && creaseX<W-1){
      ctx.save();
      ctx.beginPath(); ctx.rect(creaseX,0,W-creaseX,H); ctx.clip();
      const castW = Math.min(90,(W-creaseX)*0.35);
      const cg = ctx.createLinearGradient(creaseX,0,creaseX+castW,0);
      cg.addColorStop(0,`rgba(0,0,0,${Math.min(0.5, t*0.6)})`);
      cg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=cg; ctx.fillRect(creaseX,0,castW,H);
      ctx.restore();
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATION — spring-based for natural deceleration
═══════════════════════════════════════════════════════════════ */
let animRaf  = null;
let animFwd  = true;
let animT    = 0;   /* current t */
let animVel  = 0;   /* velocity */
let animTgt  = 0;   /* target t (0 or 1) */
let animCb   = null;

const SPRING_K    = 200;  /* stiffness */
const SPRING_DAMP = 22;   /* damping */
const SPRING_MASS = 1;

function springStep(now){
  if(!animRaf) return;
  const dt = Math.min(0.032, (now - (animStep._last||now)) / 1000);
  animStep._last = now;

  const f = -SPRING_K*(animT - animTgt) - SPRING_DAMP*animVel;
  animVel += (f / SPRING_MASS) * dt;
  animT   += animVel * dt;

  /* clamp */
  if(animTgt===1 && animT>0.999){ animT=1; animVel=0; }
  if(animTgt===0 && animT<0.001){ animT=0; animVel=0; }

  drawFlip(Math.max(0,Math.min(1,animT)), animFwd);

  if(Math.abs(animT-animTgt)<0.001 && Math.abs(animVel)<0.01){
    animT = animTgt;
    drawFlip(animT, animFwd);
    animRaf = null;
    if(animCb){ const cb=animCb; animCb=null; cb(); }
  } else {
    animRaf = requestAnimationFrame(springStep);
  }
}
function animStep(t,v,tgt,fwd,cb){
  cancelAnimationFrame(animRaf);
  animT   = t;
  animVel = v;
  animTgt = tgt;
  animFwd = fwd;
  animCb  = cb;
  animStep._last = performance.now();
  animRaf = requestAnimationFrame(springStep);
}

/* ═══════════════════════════════════════════════════════════════
   OPEN / CLOSE
═══════════════════════════════════════════════════════════════ */
function openReader(){
  cur=0; busy=false;
  readerEl.classList.add('active');
  closeBtn.classList.add('visible');
  counterEl.classList.add('visible');
  resize();
  setCounter(); updateHint();

  /* zoom-in open anim */
  let t=0; const t0=performance.now();
  function step(now){
    t=Math.min(1,(now-t0)/500);
    const e=1-Math.pow(1-t,3);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    const s=0.04+0.96*e, cx=canvas.width/2, cy=canvas.height/2;
    ctx.translate(cx,cy); ctx.scale(s,s); ctx.translate(-cx,-cy);
    drawPage(imgs[0]); ctx.restore();
    if(t<1) requestAnimationFrame(step);
    else{ drawStatic(); hintEl.classList.add('visible'); }
  }
  requestAnimationFrame(step);
}

function closeReader(){
  cancelAnimationFrame(animRaf); animRaf=null;
  busy=false; dragging=false;
  readerEl.classList.remove('active');
  closeBtn.classList.remove('visible');
  counterEl.classList.remove('visible');
  hintEl.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════════════
   DRAG / SWIPE
═══════════════════════════════════════════════════════════════ */
let dragging = false;
let startX   = 0;
let startY   = 0;
let dragFwd  = true;
let dragT    = 0;   /* t during drag 0..1 */

readerEl.addEventListener('pointerdown', onDown, {passive:true});
readerEl.addEventListener('pointermove', onMove, {passive:true});
readerEl.addEventListener('pointerup',   onUp);
readerEl.addEventListener('pointercancel', onUp);

function onDown(e){
  if(busy) return;
  cancelAnimationFrame(animRaf); animRaf=null;
  startX=e.clientX; startY=e.clientY;
  dragging=true; dragT=0;
}

function onMove(e){
  if(!dragging) return;
  const dx=e.clientX-startX, dy=e.clientY-startY;

  if(Math.abs(dx)<4 && Math.abs(dy)<4) return;

  /* lock direction on first significant move */
  if(dragT===0 && Math.abs(dy)>Math.abs(dx)){ dragging=false; return; }

  if(dragT===0){
    dragFwd = dx < 0;
    if(dragFwd && cur>=PAGES.length-1){ dragging=false; return; }
    if(!dragFwd && cur<=0)            { dragging=false; return; }
  }

  const W = canvas.width;
  dragT = Math.max(0, Math.min(1, Math.abs(dx)/W));
  drawFlip(dragT, dragFwd);
}

function onUp(e){
  if(!dragging){ dragging=false; return; }
  dragging=false;

  if(dragT===0){ drawStatic(); return; }

  const COMMIT=0.26;

  if(dragT>=COMMIT){
    /* commit — spring toward 1 with current velocity */
    const vel = (e.clientX - startX < 0 ? 1 : -1) *
                Math.abs(e.clientX - startX) / (canvas.width * 0.016);
    busy=true;
    animStep(dragT, Math.abs(vel)*0.5, 1, dragFwd, ()=>{
      cur += dragFwd ? 1 : -1;
      busy=false; dragT=0;
      drawStatic(); setCounter(); updateHint();
    });
  } else {
    /* cancel — spring back to 0 */
    animStep(dragT, 0, 0, dragFwd, ()=>{
      dragT=0; drawStatic();
    });
  }
}

/* ═══════════════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e=>{
  if(!readerEl.classList.contains('active')||busy) return;
  if(e.key==='ArrowRight'&&cur<PAGES.length-1){
    busy=true;
    animStep(0,8,1,true,()=>{ cur++; busy=false; drawStatic(); setCounter(); updateHint(); });
  }
  if(e.key==='ArrowLeft'&&cur>0){
    busy=true;
    animStep(0,8,1,false,()=>{ cur--; busy=false; drawStatic(); setCounter(); updateHint(); });
  }
  if(e.key==='Escape') closeReader();
});
